<!DOCTYPE html>
<html>
<head>
  <title>Flashcard</title>
  <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
</head>
<body>
  <div class="topic-selector">
    <h2>topic selector</h2>
    <form action="{{url_for('index')}}" method="POST">
      {% for chapter in chapters %}
      <input type="checkbox" id="{{chapter}}" name="{{chapter}}">
      <label for="{{chapter}}">{{chapter}}</label>
      <br>
      {% endfor %}
      <input type="submit" value="submit">
    </form>
    
  </div>

  <div class="main">
    <h1>Flashcard</h1>

    <div class="card">
      <p>the card itself lol</p>
      <p>idk if css can make it spin</p>
      <p>and because revealing is client side</p>
      <p>one of us has to learn javascript/typscript</p>
    </div>

    <div style="height: 20px;"></div>

    <div class="bottom-bar">
      <p>prev | flip card | next | shuffle | placeholder wghaaa</p>
    </div>
  </div>
</body>
</html>
